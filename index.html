<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      letter-spacing: 2px;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      min-height: 1.8rem;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 120px);
      grid-template-rows: repeat(3, 120px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.04);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      border-color: #e94560;
      animation: pulse 0.5s ease;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    #restart {
      margin-top: 1.8rem;
      padding: 0.7rem 2rem;
      font-size: 1rem;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }

    #restart:hover { background: #c73652; }

    #scores {
      display: flex;
      gap: 2rem;
      margin-top: 1.5rem;
      font-size: 1rem;
      color: #888;
    }

    #scores span { color: #eee; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>
  <div id="status">Player X's turn</div>
  <div id="board"></div>
  <button id="restart">Restart</button>
  <div id="scores">
    X wins: <span id="scoreX">0</span>
    &nbsp;|&nbsp;
    Draws: <span id="scoreDraw">0</span>
    &nbsp;|&nbsp;
    O wins: <span id="scoreO">0</span>
  </div>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8], // rows
      [0,3,6],[1,4,7],[2,5,8], // cols
      [0,4,8],[2,4,6]          // diags
    ];

    let board, current, gameOver, scores = {X:0, O:0, D:0};

    const boardEl  = document.getElementById('board');
    const statusEl = document.getElementById('status');
    const restartBtn = document.getElementById('restart');

    function init() {
      board = Array(9).fill('');
      current = 'X';
      gameOver = false;
      statusEl.textContent = `Player X's turn`;
      renderBoard();
    }

    function renderBoard() {
      boardEl.innerHTML = '';
      board.forEach((val, i) => {
        const cell = document.createElement('div');
        cell.className = 'cell' + (val ? ` ${val.toLowerCase()} taken` : '');
        cell.textContent = val;
        cell.addEventListener('click', () => handleClick(i));
        boardEl.appendChild(cell);
      });
    }

    function handleClick(i) {
      if (gameOver || board[i]) return;
      board[i] = current;
      renderBoard();

      const winLine = checkWin();
      if (winLine) {
        highlight(winLine);
        statusEl.textContent = `Player ${current} wins!`;
        scores[current]++;
        updateScores();
        gameOver = true;
      } else if (board.every(Boolean)) {
        statusEl.textContent = "It's a draw!";
        scores.D++;
        updateScores();
        gameOver = true;
      } else {
        current = current === 'X' ? 'O' : 'X';
        statusEl.textContent = `Player ${current}'s turn`;
      }
    }

    function checkWin() {
      return WINS.find(([a,b,c]) =>
        board[a] && board[a] === board[b] && board[b] === board[c]
      ) || null;
    }

    function highlight(line) {
      const cells = boardEl.querySelectorAll('.cell');
      line.forEach(i => cells[i].classList.add('win'));
    }

    function updateScores() {
      document.getElementById('scoreX').textContent = scores.X;
      document.getElementById('scoreO').textContent = scores.O;
      document.getElementById('scoreDraw').textContent = scores.D;
    }

    restartBtn.addEventListener('click', init);
    init();
  </script>
</body>
</html>
